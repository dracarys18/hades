name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v0.1.0, v1.2.3
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04  # Use Ubuntu 20.04 for compatibility
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
    
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl build-essential g++ git wget lsb-release software-properties-common gnupg ca-certificates musl-tools musl-dev
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 18
          apt-get install -y llvm-18-dev libpolly-18-dev
          ln -s /usr/bin/llvm-config-18 /usr/local/bin/llvm-config

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
      - name: Add musl target
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          
      - name: Build
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          export LLVM_CONFIG=llvm-config-18
          cargo build --release --target x86_64-unknown-linux-musl --verbose
          
      - name: Verify binary
        run: |
          ldd target/x86_64-unknown-linux-musl/release/hades || echo "Static binary - not dynamically linked"
          file target/x86_64-unknown-linux-musl/release/hades

      - name: Package
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf ../../../hades-x86_64-linux.tar.gz hades
          cd ../../..
          sha256sum hades-x86_64-linux.tar.gz > hades-x86_64-linux.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            hades-x86_64-linux.tar.gz
            hades-x86_64-linux.tar.gz.sha256

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          choco install llvm --allow-downgrade --force -y
          
      - name: Verify LLVM installation
        shell: pwsh
        run: |
          $llvmPath = "C:\Program Files\LLVM"
          if (Test-Path $llvmPath) {
            echo "LLVM found at $llvmPath"
            echo "LLVM_SYS_180_PREFIX=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Get-ChildItem $llvmPath
          } else {
            echo "ERROR: LLVM not found at $llvmPath"
            exit 1
          }
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build
        env:
          LLVM_SYS_180_PREFIX: C:\Program Files\LLVM
        run: cargo build --release --verbose
        
      - name: Verify binary
        run: |
          file target/release/hades.exe

      - name: Package
        run: |
          Compress-Archive -Path target/release/hades.exe -DestinationPath hades-x86_64-windows.zip
          (Get-FileHash -Algorithm SHA256 hades-x86_64-windows.zip).Hash | Out-File -Encoding ASCII hades-x86_64-windows.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: |
            hades-x86_64-windows.zip
            hades-x86_64-windows.zip.sha256

  build-macos:
    name: Build macOS
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
            runner: macos-12  # Intel runner
          - target: aarch64-apple-darwin
            arch: aarch64
            runner: macos-latest  # Apple Silicon runner
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM and dependencies
        run: |
          brew install llvm@18 zstd
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build
        env:
          LLVM_CONFIG: ${{ matrix.arch == 'x86_64' && '/usr/local/opt/llvm@18/bin/llvm-config' || '/opt/homebrew/opt/llvm@18/bin/llvm-config' }}
          LLVM_SYS_180_PREFIX: ${{ matrix.arch == 'x86_64' && '/usr/local/opt/llvm@18' || '/opt/homebrew/opt/llvm@18' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.arch == 'x86_64' && '10.12' || '11.0' }}
          RUSTFLAGS: -C link-arg=-L${{ matrix.arch == 'x86_64' && '/usr/local/lib' || '/opt/homebrew/lib' }} -C link-arg=-lc++ -C link-arg=/opt/homebrew/lib/libzstd.a
        run: cargo build --release --verbose
        
      - name: Verify binary
        run: |
          otool -L target/release/hades || true
          file target/release/hades

      - name: Package
        run: |
          cd target/release
          tar czf ../../hades-${{ matrix.arch }}-macos.tar.gz hades
          cd ../..
          shasum -a 256 hades-${{ matrix.arch }}-macos.tar.gz > hades-${{ matrix.arch }}-macos.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-binary
          path: |
            hades-${{ matrix.arch }}-macos.tar.gz
            hades-${{ matrix.arch }}-macos.tar.gz.sha256

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Display structure
        run: ls -R artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-binary/*
            artifacts/windows-binary/*
            artifacts/macos-x86_64-binary/*
            artifacts/macos-aarch64-binary/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
