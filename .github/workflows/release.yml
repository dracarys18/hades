name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v0.1.0, v1.2.3
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04  # Use Ubuntu 20.04 for compatibility
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
    
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl build-essential g++ git wget lsb-release software-properties-common gnupg ca-certificates patchelf
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 18
          apt-get install -y llvm-18-dev libpolly-18-dev zlib1g-dev libzstd-dev
          ln -s /usr/bin/llvm-config-18 /usr/local/bin/llvm-config

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
      - name: Build
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          export LLVM_CONFIG=llvm-config-18
          cargo build --release --verbose
          
      - name: Verify binary
        run: |
          ldd target/release/hades
          file target/release/hades

      - name: Bundle LLVM libraries
        run: |
          mkdir -p hades-bundle/lib
          cp target/release/hades hades-bundle/
          
          # Copy LLVM shared libraries
          ldd target/release/hades | grep "=> /" | awk '{print $3}' | while read lib; do
            if [[ "$lib" == /usr/lib/llvm-18* ]] || [[ "$lib" == *libzstd* ]] || [[ "$lib" == *libz.so* ]]; then
              cp "$lib" hades-bundle/lib/
            fi
          done
          
          # Create install script
          cat > hades-bundle/install.sh << 'EOF'
          #!/bin/bash
          set -e
          
          INSTALL_DIR="${INSTALL_DIR:-$HOME/.local/bin}"
          LIB_DIR="${LIB_DIR:-$HOME/.local/lib/hades}"
          
          echo "Installing Hades compiler..."
          echo "Binary will be installed to: $INSTALL_DIR"
          echo "Libraries will be installed to: $LIB_DIR"
          
          # Create directories
          mkdir -p "$INSTALL_DIR"
          mkdir -p "$LIB_DIR"
          
          # Get script directory
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          
          # Copy binary and libraries
          cp "$SCRIPT_DIR/hades" "$INSTALL_DIR/hades-bin"
          cp "$SCRIPT_DIR"/lib/* "$LIB_DIR/"
          
          # Create wrapper script
          cat > "$INSTALL_DIR/hades" << 'WRAPPER'
          #!/bin/bash
          export LD_LIBRARY_PATH="$HOME/.local/lib/hades:$LD_LIBRARY_PATH"
          exec "$HOME/.local/bin/hades-bin" "$@"
          WRAPPER
          chmod +x "$INSTALL_DIR/hades"
          
          echo ""
          echo "Installation complete!"
          echo ""
          echo "Add to your PATH by adding this line to ~/.bashrc or ~/.zshrc:"
          echo '  export PATH="$HOME/.local/bin:$PATH"'
          echo ""
          echo "Then run: source ~/.bashrc (or source ~/.zshrc)"
          echo ""
          echo "Verify installation with: hades --version"
          EOF
          chmod +x hades-bundle/install.sh
          
          # Create README
          cat > hades-bundle/README.md << 'EOF'
          # Hades Compiler
          
          ## Installation
          
          Extract and run the install script:
          
          ```bash
          tar xzf hades-x86_64-linux.tar.gz
          cd hades-bundle
          ./install.sh
          ```
          
          This will install hades to `~/.local/bin` by default.
          
          ### Custom installation directory
          
          ```bash
          INSTALL_DIR=/usr/local/bin LIB_DIR=/usr/local/lib/hades sudo -E ./install.sh
          ```
          
          ### Manual installation
          
          If you prefer not to use the install script, you can run the binary directly with:
          
          ```bash
          export LD_LIBRARY_PATH="$(pwd)/lib:$LD_LIBRARY_PATH"
          ./hades --version
          ```
          EOF

      - name: Package
        run: |
          tar czf hades-x86_64-linux.tar.gz hades-bundle/
          sha256sum hades-x86_64-linux.tar.gz > hades-x86_64-linux.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            hades-x86_64-linux.tar.gz
            hades-x86_64-linux.tar.gz.sha256

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          choco install llvm --version=18.1.8 --allow-downgrade --force -y
          
      - name: Verify LLVM installation
        shell: pwsh
        run: |
          $llvmPath = "C:\Program Files\LLVM"
          if (Test-Path $llvmPath) {
            echo "LLVM installation contents:"
            Get-ChildItem -Path $llvmPath -Recurse -Depth 1
            
            # Check for llvm-config
            $llvmConfig = "$llvmPath\bin\llvm-config.exe"
            if (Test-Path $llvmConfig) {
              echo "Found llvm-config at: $llvmConfig"
              & $llvmConfig --version
            } else {
              echo "WARNING: llvm-config not found at $llvmConfig"
            }
            
            # Set environment variable for next steps
            echo "LLVM_SYS_180_PREFIX=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "ERROR: LLVM not found at $llvmPath"
            Get-ChildItem "C:\Program Files" | Where-Object { $_.Name -like "*llvm*" }
            exit 1
          }
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build
        shell: pwsh
        run: |
          $env:LLVM_SYS_180_PREFIX = "C:\Program Files\LLVM"
          echo "LLVM_SYS_180_PREFIX is set to: $env:LLVM_SYS_180_PREFIX"
          cargo build --release --verbose
        
      - name: Verify binary
        run: |
          file target/release/hades.exe

      - name: Package
        run: |
          Compress-Archive -Path target/release/hades.exe -DestinationPath hades-x86_64-windows.zip
          (Get-FileHash -Algorithm SHA256 hades-x86_64-windows.zip).Hash | Out-File -Encoding ASCII hades-x86_64-windows.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: |
            hades-x86_64-windows.zip
            hades-x86_64-windows.zip.sha256

  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM and dependencies
        run: |
          brew install llvm@18 zstd
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build
        env:
          LLVM_CONFIG: /opt/homebrew/opt/llvm@18/bin/llvm-config
          LLVM_SYS_180_PREFIX: /opt/homebrew/opt/llvm@18
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          RUSTFLAGS: -C link-arg=-L/opt/homebrew/lib -C link-arg=-lc++ -C link-arg=/opt/homebrew/lib/libzstd.a
        run: cargo build --release --verbose
        
      - name: Verify binary
        run: |
          otool -L target/release/hades || true
          file target/release/hades

      - name: Bundle libraries
        run: |
          mkdir -p hades-bundle/lib
          cp target/release/hades hades-bundle/
          
          # Copy Homebrew libraries (LLVM, zstd, etc.)
          otool -L target/release/hades | grep -E '(homebrew|local)' | awk '{print $1}' | while read lib; do
            if [ -f "$lib" ]; then
              cp "$lib" hades-bundle/lib/
            fi
          done
          
          # Create install script
          cat > hades-bundle/install.sh << 'EOF'
          #!/bin/bash
          set -e
          
          INSTALL_DIR="${INSTALL_DIR:-$HOME/.local/bin}"
          LIB_DIR="${LIB_DIR:-$HOME/.local/lib/hades}"
          
          echo "Installing Hades compiler..."
          echo "Binary will be installed to: $INSTALL_DIR"
          echo "Libraries will be installed to: $LIB_DIR"
          
          # Create directories
          mkdir -p "$INSTALL_DIR"
          mkdir -p "$LIB_DIR"
          
          # Get script directory
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          
          # Copy binary and libraries
          cp "$SCRIPT_DIR/hades" "$INSTALL_DIR/hades-bin"
          if [ -d "$SCRIPT_DIR/lib" ] && [ "$(ls -A $SCRIPT_DIR/lib)" ]; then
            cp "$SCRIPT_DIR"/lib/* "$LIB_DIR/" 2>/dev/null || true
          fi
          
          # Create wrapper script
          cat > "$INSTALL_DIR/hades" << 'WRAPPER'
          #!/bin/bash
          export DYLD_LIBRARY_PATH="$HOME/.local/lib/hades:$DYLD_LIBRARY_PATH"
          exec "$HOME/.local/bin/hades-bin" "$@"
          WRAPPER
          chmod +x "$INSTALL_DIR/hades"
          
          echo ""
          echo "Installation complete!"
          echo ""
          echo "Add to your PATH by adding this line to ~/.zshrc or ~/.bash_profile:"
          echo '  export PATH="$HOME/.local/bin:$PATH"'
          echo ""
          echo "Then run: source ~/.zshrc (or source ~/.bash_profile)"
          echo ""
          echo "Verify installation with: hades --version"
          EOF
          chmod +x hades-bundle/install.sh
          
          # Create README
          cat > hades-bundle/README.md << 'EOF'
          # Hades Compiler (macOS Apple Silicon)
          
          ## Installation
          
          Extract and run the install script:
          
          ```bash
          tar xzf hades-aarch64-macos.tar.gz
          cd hades-bundle
          ./install.sh
          ```
          
          This will install hades to `~/.local/bin` by default.
          
          ### Custom installation directory
          
          ```bash
          INSTALL_DIR=/usr/local/bin LIB_DIR=/usr/local/lib/hades sudo -E ./install.sh
          ```
          
          ### Manual installation
          
          If you prefer not to use the install script, you can run the binary directly with:
          
          ```bash
          export DYLD_LIBRARY_PATH="$(pwd)/lib:$DYLD_LIBRARY_PATH"
          ./hades --version
          ```
          
          ### Requirements
          
          This build may require Homebrew libraries. If you encounter issues, install:
          
          ```bash
          brew install llvm@18 zstd
          ```
          EOF

      - name: Package
        run: |
          tar czf hades-aarch64-macos.tar.gz hades-bundle/
          shasum -a 256 hades-aarch64-macos.tar.gz > hades-aarch64-macos.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: |
            hades-aarch64-macos.tar.gz
            hades-aarch64-macos.tar.gz.sha256

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Display structure
        run: ls -R artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-binary/*
            artifacts/windows-binary/*
            artifacts/macos-binary/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
