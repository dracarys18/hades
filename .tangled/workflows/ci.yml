when:
  - event: ["pull_request", "manual"]
    branch: ["master"]

engine: "nixery"

dependencies:
  nixpkgs:
    - rustup
    - llvmpackages_21.llvm.dev
    - llvmpackages_21.clang
    - zlib
    - zstd

steps:
  - name: "Install Rust"
    command: "rustup toolchain install stable && rustup default stable"

  - name: "Clippy"
    command: "cargo clippy --all-features --all-targets -- -D warnings"

  - name: "Test Examples"
    command: "bash scripts/test_examples.sh"
