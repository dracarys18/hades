name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v0.1.0, v1.2.3

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04  # Use Ubuntu 20.04 for compatibility
    
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl build-essential git wget lsb-release software-properties-common gnupg ca-certificates
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 18
          apt-get install -y llvm-18-dev libpolly-18-dev
          ln -s /usr/bin/llvm-config-18 /usr/local/bin/llvm-config

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
      - name: Build
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          export LLVM_CONFIG=llvm-config-18
          cargo build --release --verbose
          
      - name: Verify binary
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ldd target/release/hades || true
          ./target/release/hades --version

      - name: Package
        run: |
          cd target/release
          tar czf ../../hades-x86_64-linux.tar.gz hades
          cd ../..
          sha256sum hades-x86_64-linux.tar.gz > hades-x86_64-linux.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            hades-x86_64-linux.tar.gz
            hades-x86_64-linux.tar.gz.sha256

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: choco install llvm --version=18.1.8 -y
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build
        env:
          LLVM_SYS_180_PREFIX: C:\Program Files\LLVM
        run: cargo build --release --verbose
        
      - name: Verify binary
        run: |
          .\target\release\hades.exe --version

      - name: Package
        run: |
          Compress-Archive -Path target/release/hades.exe -DestinationPath hades-x86_64-windows.zip
          (Get-FileHash -Algorithm SHA256 hades-x86_64-windows.zip).Hash | Out-File -Encoding ASCII hades-x86_64-windows.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: |
            hades-x86_64-windows.zip
            hades-x86_64-windows.zip.sha256

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm@18
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build
        env:
          LLVM_CONFIG: /opt/homebrew/opt/llvm@18/bin/llvm-config
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.arch == 'x86_64' && '10.12' || '11.0' }}
        run: cargo build --release --target ${{ matrix.target }} --verbose
        
      - name: Verify binary
        run: |
          otool -L target/${{ matrix.target }}/release/hades || true
          file target/${{ matrix.target }}/release/hades
          ./target/${{ matrix.target }}/release/hades --version

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../hades-${{ matrix.arch }}-macos.tar.gz hades
          cd ../../..
          shasum -a 256 hades-${{ matrix.arch }}-macos.tar.gz > hades-${{ matrix.arch }}-macos.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-binary
          path: |
            hades-${{ matrix.arch }}-macos.tar.gz
            hades-${{ matrix.arch }}-macos.tar.gz.sha256

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Display structure
        run: ls -R artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-binary/*
            artifacts/windows-binary/*
            artifacts/macos-x86_64-binary/*
            artifacts/macos-aarch64-binary/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
